name: Deploy Server to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script_stop: true
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /root/server
            git fetch origin
            git reset --hard origin/main
            npm install
            npx prisma migrate deploy
            npx prisma generate
            npm run build
            pm2 restart logistic-server --update-env || pm2 restart 0

      - name: Checkout Code to GitHub Runner
        uses: actions/checkout@v4

      - name: Setup Node.js on Runner
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Code on GitHub Runner
        run: |
          npm install
          npm run build

      - name: Copy Compiled Code to AWS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          source: "dist/,package.json,package-lock.json,prisma/"
          target: "/home/ubuntu/"

      - name: Restart PM2 on AWS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script_stop: true
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /home/ubuntu/server
            npm install --omit=dev
            npx prisma generate
            pm2 restart logistic-server --update-env || pm2 start dist/index.js --name "logistic-server"
